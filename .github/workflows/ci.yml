name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go-lint-test:
    name: Go Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: orchestrator/go.sum

      - name: Download dependencies
        working-directory: orchestrator
        run: go mod download

      - name: Vet
        working-directory: orchestrator
        run: go vet ./...

      - name: Test
        working-directory: orchestrator
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: orchestrator/coverage.out
          fail_ci_if_error: false

  python-lint-test:
    name: Python Lint & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - name: Install dependencies
        working-directory: sidecar
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint (ruff)
        working-directory: sidecar
        run: ruff check .

      - name: Test
        working-directory: sidecar
        run: pytest --tb=short -q

  proto-check:
    name: Protobuf Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: bufbuild/buf-setup-action@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Buf lint
        uses: bufbuild/buf-lint-action@v1
        with:
          input: proto

      - name: Buf breaking
        uses: bufbuild/buf-breaking-action@v1
        if: github.event_name == 'pull_request'
        with:
          input: proto
          against: "https://github.com/${{ github.repository }}.git#branch=${{ github.base_ref }},ref=HEAD~1,subdir=proto"

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: [go-lint-test, python-lint-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build orchestrator image
        run: docker build -t wisdev-orchestrator ./orchestrator

      - name: Build sidecar image
        run: docker build -t wisdev-sidecar ./sidecar
