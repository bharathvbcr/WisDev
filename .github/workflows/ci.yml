name: WisDev Agent OS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  go:
    name: Go orchestrator
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: orchestrator
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache-dependency-path: orchestrator/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Test extracted runtime
        run: go test ./internal/api ./internal/search ./internal/wisdev ./internal/rag ./internal/evidence ./internal/evidence/citations ./internal/telemetry ./internal/stackconfig ./cmd/server ./cmd/wisdev ./pkg/wisdev -count=1 -parallel=1

  python-contract:
    name: Python sidecar contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test runner
        run: python -m pip install --upgrade pip pytest

      - name: Test open-source stack contract
        run: python -m pytest -q tests/unit/test_stack_contract.py
