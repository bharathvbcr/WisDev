services:
  orchestrator:
    build:
      context: ./orchestrator
    environment:
      WISDEV_CONFIG: /app/config/wisdev.example.yaml
      WISDEV_MODEL_CONFIG: /app/config/wisdev_models.example.json
      WISDEV_STATE_DIR: /data/state
      WISDEV_JOURNAL_PATH: /data/wisdev_journal.jsonl
      PYTHON_SIDECAR_HTTP_URL: http://sidecar:8090
      PYTHON_SIDECAR_GRPC_ADDR: sidecar:50052
      TEMPORAL_ENABLED: "false"
    ports:
      - "8081:8081"
      - "50053:50053"
    volumes:
      - wisdev-data:/data
      - ./config:/app/config:ro
    depends_on:
      - sidecar

  sidecar:
    build:
      context: ./sidecar
    environment:
      WISDEV_LLM_BASE_URL: ${WISDEV_LLM_BASE_URL:-http://host.docker.internal:11434/v1}
      WISDEV_LLM_MODEL: ${WISDEV_LLM_MODEL:-llama3.1}
      WISDEV_LLM_API_KEY: ${WISDEV_LLM_API_KEY:-}
    ports:
      - "8090:8090"
      - "50052:50052"

volumes:
  wisdev-data:
