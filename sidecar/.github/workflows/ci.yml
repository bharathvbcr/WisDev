# ScholarLM CloudRun Backend CI
#
# Runs on PRs and pushes to main for sidecar/ directory.

name: CloudRun CI

on:
  push:
    branches: [main]
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sidecar/**'
      - '.github/workflows/sidecar-ci.yml'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: sidecar/requirements.txt

      - name: Install dependencies
        working-directory: sidecar
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov httpx ruff mypy bandit pip-audit

      - name: Audit dependencies for vulnerabilities
        working-directory: sidecar
        run: pip-audit || true

      - name: Security scan with bandit
        working-directory: sidecar
        run: bandit -r . -x .tests -f json -o bandit-report.json || true

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report-sidecar
          path: sidecar/bandit-report.json
          retention-days: 7

      - name: Lint with ruff
        working-directory: sidecar
        run: ruff check .

      - name: Type check with mypy
        working-directory: sidecar
        run: mypy . --ignore-missing-imports --no-error-summary || true

      - name: Run unit tests
        working-directory: sidecar
        run: pytest tests/ -v --cov=. --cov-report=term -x

      - name: Run integration tests
        working-directory: sidecar
        run: |
          pytest tests/ -v -k "integration or remote" || true
        env:
          REDIS_URL: redis://localhost:6379
          GEMINI_API_KEY: test-key-for-ci
