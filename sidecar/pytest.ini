[pytest]
testpaths = tests
norecursedirs = .* build dist node_modules __pycache__ ~* *site-packages*
filterwarnings =
    ignore:.*_UnionGenericAlias.*Python 3\.17.*:DeprecationWarning:google\.genai\.types
    ignore:.*asyncio\.iscoroutinefunction.*Python 3\.16.*:DeprecationWarning:slowapi\.extension
