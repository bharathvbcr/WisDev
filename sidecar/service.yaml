apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wisdev-api
spec:
  template:
    metadata:
      annotations:
        # Keep 1 instance warm to eliminate cold starts (~$7/month)
        autoscaling.knative.dev/minScale: "1"
        # Cap at 10 instances to bound costs during scaling
        autoscaling.knative.dev/maxScale: "10"
    spec:
      # 80 concurrent requests per instance — uvicorn handles I/O-bound workloads well
      containerConcurrency: 80
      timeoutSeconds: 60
      containers:
        - image: ghcr.io/wisdev-agent/wisdev-sidecar:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: PORT
              value: "8080"
