apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: wisdev-sidecar
spec:
  template:
    metadata:
      annotations:
        # Keep one warm instance for the Gemini sidecar so cold-start retries do
        # not dominate the first browser-facing request.
        run.googleapis.com/startup-cpu-boost: "true"
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
    spec:
      # Match the app-owned retry and budget policy before reducing concurrency.
      # Raise or lower this only with evidence of queueing inside a warm pod.
      containerConcurrency: 80
      # Cloud Run's ceiling should sit comfortably above app-owned latency
      # budgets, not act as the first timeout surface. The Go orchestrator owns
      # the 55s outer deadline; the sidecar keeps a 60s transport ceiling.
      timeoutSeconds: 60
      containers:
        - image: ghcr.io/wisdev/wisdev-sidecar:latest
          ports:
            - containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: PORT
              value: "8080"
